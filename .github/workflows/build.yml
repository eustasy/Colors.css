name: Build CSS and data

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths: ["data/*", "utils/*"]

permissions:
  contents: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Check out repo
      uses: actions/checkout@v6
    - name: Set up Python 3.8
      uses: actions/setup-python@v6
      with:
        python-version: 3.8
    - name: Build CSS from data
      run: python utils/generator.py
    - name: Build index data from data
      run: python utils/data.py
    - name: Commit changes
      run: |
        git remote set-url origin https://x-access-token:"$GITHUB_TOKEN"@github.com/"$GITHUB_REPOSITORY".git
        git config --global user.email "actions@github.com"
        git config --global user.name "actions"
        git checkout main
        git add .
        git commit -m "Automatic build from data" && git push --set-upstream origin main || true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
